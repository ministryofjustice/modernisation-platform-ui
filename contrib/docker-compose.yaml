---
services:
  app:
    image: "${CONTAINER_IMAGE_NAME:-ministryofjustice/modernisation-platform-ui}:${CONTAINER_IMAGE_TAG:-local}"
    platform: linux/amd64
    env_file:
      - path: ../.env
        required: false
    environment:
      # Flask
      - APP_SECRET_KEY=dev
      - FLASK_DEBUG=false

      # Auth0
      - AUTH0_CLIENT_ID=dev
      - AUTH0_CLIENT_SECRET=dev
      - AUTH0_DOMAIN=operations-engineering.eu.auth0.com

      # App
      - PHASE_BANNER_TEXT=LOCAL DEV
      - ENV=local

      # GitHub
      - GITHUB_APP_INSTALLATION_ID=12345678

      # Local
      - LOGGING_LEVEL=DEBUG
      - AUTH_ENABLED=false

      # Sentry
      - SENTRY_DSN_KEY=
      - SENTRY_ENV=local
    ports:
      - "4567:4567"
